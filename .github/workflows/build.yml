name: Expo Free Cloud Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Fixed the 'node-node-version' typo

      # This completely bypasses the extension mismatch by manually forcing the newest version
      - name: Install Latest EAS CLI Manually
        run: npm install -g eas-cli

      - name: Expo Login Authentication
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Trigger EAS Build
        run: eas build --platform android --profile development --non-interactive
        
