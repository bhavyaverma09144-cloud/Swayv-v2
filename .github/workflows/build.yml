name: Expo Free Cloud Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Uses the latest stable Node version to prevent deprecation warnings
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Official Gradle tool that automatically handles advanced caching for native Android code
      - name: Setup and Smart-Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Upgrade EAS CLI Tool
        run: npm install -g eas-cli

      - name: Setup EAS Authenticator
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Project Dependencies
        run: npm install

      - name: Trigger Local EAS Build
        run: eas build --platform android --profile development --local --non-interactive --output=./swayv-development.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swayv-development-apk
          path: ./swayv-development.apk
          
