name: Expo Free Cloud Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Updated to fix the Node 20 deprecation warning

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          # Removed the automatic gradle cache from here to prevent the crash

      # Smart Caching: This targets the Gradle folders directly and hooks into package-lock.json
      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable Global Gradle Caching
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.caching=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      - name: Upgrade EAS CLI Tool
        run: npm install -g eas-cli

      - name: Setup EAS Authenticator
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Project Dependencies
        run: npm install

      - name: Trigger Local EAS Build
        run: eas build --platform android --profile production --local --non-interactive --output=./swayv-production.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: swayv-production-apk
          path: ./swayv-production.apk