name: Expo Free Cloud Build
on:
  push:
    branches: [ main ] # Triggers build every time you push code to 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/actions-setup-node@v4
        with:
          node-node-version: 20

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Trigger EAS Build
        run: eas build --platform android --profile development --non-interactive
        
